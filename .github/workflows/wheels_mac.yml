name: Mac wheel build

on:
  workflow_dispatch:
  push:
    branches:
      - mac-os-wheel-torch-2.6.0

jobs:
  build:
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        platform: [macos-14]
        python-version: ["3.10", "3.11"]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          # ref: 'v0.0.27'
          submodules: recursive
          path: "."
          fetch-depth: 0 # for tags

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install older LLVM/Clang
        run: |
          # Remove any existing LLVM installation
          brew uninstall --ignore-dependencies llvm || true
          
          # Install LLVM 16 (which includes Clang 16)
          brew install llvm@16
          brew install libomp
          
          echo "Using Clang version:"
          /usr/local/opt/llvm@16/bin/clang --version || /opt/homebrew/opt/llvm@16/bin/clang --version

      - name: Install locally
        run: |
          python -m pip install torch==2.6.0
          python -m pip install --upgrade pip==23.3.2
          python -m pip install wheel ninja delocate
          
          # Use Clang 16 for compilation
          if [ -d "/usr/local/opt/llvm@16/bin" ]; then
            CLANG_PATH="/usr/local/opt/llvm@16/bin"
          else
            CLANG_PATH="/opt/homebrew/opt/llvm@16/bin"
          fi
          
          MACOSX_DEPLOYMENT_TARGET=10.9 ARCHFLAGS="-arch arm64" CC="$CLANG_PATH/clang" CXX="$CLANG_PATH/clang++" python setup.py bdist_wheel -d dist/ -k $PLAT_ARG
        # MACOSX_DEPLOYMENT_TARGET=10.9 ARCHFLAGS="-arch arm64" CC="$CLANG_PATH/clang" CXX="$CLANG_PATH/clang++" python -m pip wheel . -w wheels
      - name: Check the wheel
        run: delocate-listdeps dist/*.whl
      - run: du -h dist/*
      - uses: actions/upload-artifact@v4
        with:
          path: dist/*.whl
